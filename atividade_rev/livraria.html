<html>
    <head>
        <title>BookStops</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body>
        <div class="container">
        <header class="bg-black text-rgba(241, 241, 210, 0.89); text-center p-4">
           <img src="BookStops.png" width="630" width="200"/>
            <h1><strong>Novos Capítulos</strong></h1>
            <p>Livros mágicos</p>
          <style>  
            body {
                background-color: rgb(87, 0, 0);
            }
             li {
                background-color: rgb(87, 0, 0);
            }
            h1 { 
                color: rgba(241, 241, 210, 0.89);
            }
            p { 
                color: rgba(241, 241, 210, 0.89);
            }
          </style>
        </header>
        <nav class="nav bg-secondary">
            <a href="#" class="nav-link link-light">Início</a>
             <a href="#" class="nav-link link-light">livros</a>
              <a href="#" class="nav-link link-light">Carrinho</a> 
              <style>
                a { 
                color: rgba(241, 241, 210, 0.89);
            }
              </style>
        </nav>
        <h2>Preferidos</h2>
        <ul class="list-group">
            <li class="list-group-item bg-transparent text-light">A Hipótese do Amor</li>
            <li class="list-group-item bg-transparent text-light">Assistente do Vilão</li>
            <li class="list-group-item bg-transparent text-light">Quarta asa</li>
        </ul>

        <h2>Catálogo</h2>
        <table class="table" border="1">
            <tr>
                <th>Livro</th>
                <th>Preço</th>
            </tr>
            <tr>
                <td>A Hipótese do Amor</td>
                <td>R$ 57,00</td>
            </tr>
             <tr>
                <td>Assistente do Vilão</td>
                <td>R$ 47,19</td>
            </tr>
             <tr>
                <td>Quarta asa</td>
                <td>R$ 78,99</td>
                <style>
                td { 
                color: rgba(241, 241, 210, 0.89);
            }
            th { 
                color: rgba(241, 241, 210, 0.89);
            }
            h2 { 
                color: rgba(241, 241, 210, 0.89);
            }
            li { 
                color: rgba(241, 241, 210, 0.89);
            }
              </style>
            </tr>
        </table>

        <h2>Carrinho</h2>
        <form>
            <label>Carrinho</label>
            <input type="texto">
            <p></p>
            <label>Número de livros</label>
            <input type="number">
            <p></p>
            <label>Entrega Rápida?</label>
            <input type="radio" name="Rápida"> Sim
            <input type="radio" name="Rápida"> Não
            <p></p>
            <label>Ocasião</label>
            <select>
                <option>Presente</option>
                 <option>Padrão</option>
            </select>
            <style>
                label { 
                color: rgba(241, 241, 210, 0.89);
            }
            </style>
            <button>Carrinho</button>
        </form>
        <footer>
            <p>BookStops</p>
        </footer>
        </div>
    </body>
</html>
