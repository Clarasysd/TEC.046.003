<html>

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container">
        <div class="card">
            <!-- Cabeçalho e título do RPG -->
            <div class="card-header text-center">O Intocável e a Maldição - Criado por Clara Gomes</div>
            <!-- Tela Central do Jogo -->
            <div class="card-body"id="tela" style="background-image: url('assets/download\ \(2\).jpg');
             background-size: cover";>
            <div class="row">
                <!-- Status do Herói -->
                <div class="col">
                    <ul class="list-group float-end text-center" style="width: 225px;">
                        <li class="list-group-item"><strong id="nome-hero"></strong></li>
                        <li id="titulo-hero" class="list-group-item"></li>
                        <li class="list-group-item">
                            ❤️
                            <progress id="hp-hero" value="100" max="100" style="accent-color: red;"></progress>
                        </li>
                        <li class="list-group-item">
                            🔴
                            <progress id="mp-hero" value="100" max="100" style="accent-color: blue;"></progress>
                        </li>
                        <li class="list-group-item">
                            🔵
                            <progress id="en-hero" value="0" max="100" style="accent-color: purple;"></progress>
                        </li>
                    </ul>
                </div>
                <!-- Status do Chefe -->
                <div class="col">
                    <ul class="list-group float-start text-center" style="width: 225px;">
                        <li class="list-group-item"><strong id="nome-boss"></strong></li>
                        <li id="titulo-boss" class="list-group-item"></li>
                        <li class="list-group-item">
                            ❤️
                            <progress id="hp-boss" value="100" max="100" style="accent-color: red;"></progress>
                        </li>
                        <li class="list-group-item">
                            ⚔️
                            <progress id="en-boss" value="0" max="100" style="accent-color: orange;"></progress>
                        </li>                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                    </ul>
                </div>
            </div> 
            <div class="row">
                <!-- IMG HERO -->
                <div class="col text-end">
                    <img src="assets/gojo.gif" width="250" height="300" />
                    <div id="controles"></div>
                <div class="btn-group" id="controles"></div>
                </div>
                <!-- IMG BOSS -->
                <div class="col">
                    <img src="assets/sukuna.gif" width="250" height="250" />
                </div>
            </div>
            <div class="card-footer text-center">
                <small class="text-muted">Ações do Herói</small>
                <p></p>
                <small class="text-muted">Ações do boss</small>
            </div>
        </div> <!-- fechamento do card -->
    </div> <!-- fechamento do container-->
<script src="javascript.js"></script>
</body>

</html>
